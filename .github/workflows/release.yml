name: Release Knotpad

on:
  repository_dispatch:
    types: [trigger-release-build]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version to release (e.g., v1.4.0)'
        required: true
        default: 'v1.4.0'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: intel
          - target: aarch64-apple-darwin
            arch: apple-silicon

    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: 'thillagen/knotpad'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch version from tag
        run: |
          TAG="${{ github.event.client_payload.ref || inputs.tag }}"
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v' \
            apps/desktop/src-tauri/tauri.conf.json > tmp.json \
            && mv tmp.json apps/desktop/src-tauri/tauri.conf.json
          echo "Patched version → $VERSION"

      - name: Build Tauri app
        run: pnpm --filter ./apps/desktop tauri build --target ${{ matrix.target }}
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload to public releases
        uses: softprops/action-gh-release@v2
        with:
          repository: knotpad/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.client_payload.ref || inputs.tag }}
          files: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: 'thillagen/knotpad'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch version from tag
        run: |
          $TAG = "${{ github.event.client_payload.ref || inputs.tag }}"
          $VERSION = $TAG -replace '^v', ''
          $json = Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $VERSION
          $json | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/src-tauri/tauri.conf.json
          echo "Patched version → $VERSION"
        shell: pwsh

      - name: Build Tauri app
        run: pnpm --filter ./apps/desktop tauri build
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload to public releases
        uses: softprops/action-gh-release@v2
        with:
          repository: knotpad/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.client_payload.ref || inputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v4
        with:
          repository: 'thillagen/knotpad'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch version from tag
        run: |
          TAG="${{ github.event.client_payload.ref || inputs.tag }}"
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v' \
            apps/desktop/src-tauri/tauri.conf.json > tmp.json \
            && mv tmp.json apps/desktop/src-tauri/tauri.conf.json
          echo "Patched version → $VERSION"

      - name: Build Tauri app
        run: pnpm --filter ./apps/desktop tauri build
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload to public releases
        uses: softprops/action-gh-release@v2
        with:
          repository: knotpad/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.client_payload.ref || inputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig

  update-formula:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: knotpad/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Get version
        id: version
        run: |
          TAG="${{ github.event.client_payload.ref || inputs.tag }}"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download DMGs to calculate hashes
        run: |
          curl -sfL "https://github.com/knotpad/homebrew-tap/releases/download/${{ github.event.client_payload.ref || inputs.tag }}/knotpad_${{ steps.version.outputs.VERSION }}_aarch64.dmg" -o aarch64.dmg
          curl -sfL "https://github.com/knotpad/homebrew-tap/releases/download/${{ github.event.client_payload.ref || inputs.tag }}/knotpad_${{ steps.version.outputs.VERSION }}_x64.dmg" -o x64.dmg

      - name: Calculate SHA256 hashes
        id: hashes
        run: |
          echo "AARCH64=$(shasum -a 256 aarch64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "X64=$(shasum -a 256 x64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/knotpad.rb << 'EOF'
          cask "knotpad" do
            version "${{ steps.version.outputs.VERSION }}"

            on_intel do
              sha256 "${{ steps.hashes.outputs.X64 }}"
              url "https://github.com/knotpad/homebrew-tap/releases/download/v#{version}/knotpad_#{version}_x64.dmg"
            end

            on_arm do
              sha256 "${{ steps.hashes.outputs.AARCH64 }}"
              url "https://github.com/knotpad/homebrew-tap/releases/download/v#{version}/knotpad_#{version}_aarch64.dmg"
            end

            name "Knotpad"
            desc "Note-first project management with automatic task generation"
            homepage "https://knotpad.app"

            auto_updates true

            app "Knotpad.app"

            postflight do
              system_command "xattr", args: ["-cr", "#{appdir}/Knotpad.app"]
            end

            zap trash: [
              "~/Library/Application Support/knotpad",
              "~/Library/Preferences/app.knotpad.plist",
              "~/Library/Logs/knotpad",
            ]
          end
          EOF

      - name: Commit and push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/knotpad.rb
          git commit -m "Update knotpad to ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Generate updater.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.client_payload.ref || inputs.tag }}
        run: |
          node -e "
          const fs = require('fs');
          async function run() {
            const token = process.env.GITHUB_TOKEN;
            const tag = process.env.TAG_NAME;
            const version = tag.replace(/^v/, '');
            const repo = 'knotpad/homebrew-tap';
            
            const res = await fetch('https://api.github.com/repos/' + repo + '/releases/tags/' + tag, {
              headers: { Authorization: 'token ' + token }
            });
            if (!res.ok) throw new Error('Failed to fetch release: ' + res.statusText);
            const release = await res.json();
            const assets = release.assets;

            const platforms = {};

            for (const asset of assets) {
              const name = asset.name;
              const url = asset.browser_download_url;

              if (name.endsWith('.sig')) {
                const targetName = name.replace('.sig', '');
                const targetAsset = assets.find(a => a.name === targetName);
                if (!targetAsset) continue;

                const sigRes = await fetch(url);
                const signature = (await sigRes.text()).trim();

                let platformKey = '';
                if (targetName.includes('aarch64') && targetName.endsWith('.app.tar.gz')) {
                  platformKey = 'darwin-aarch64';
                } else if (targetName.includes('x64') && targetName.endsWith('.app.tar.gz')) {
                  platformKey = 'darwin-x86_64';
                } else if (targetName.includes('amd64') && targetName.endsWith('.AppImage')) {
                  platformKey = 'linux-x86_64';
                } else if (targetName.includes('x64') && targetName.endsWith('.msi')) {
                  platformKey = 'windows-x86_64';
                }

                if (platformKey) {
                  platforms[platformKey] = {
                    signature,
                    url: targetAsset.browser_download_url
                  };
                }
              }
            }

            const updaterJson = {
              version: tag,
              notes: 'Knotpad version ' + version + ' release.',
              pub_date: new Date().toISOString(),
              platforms
            };

            fs.writeFileSync('updater.json', JSON.stringify(updaterJson, null, 2));
            console.log('Generated updater.json:', updaterJson);
          }
          run().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Upload updater.json to release
        uses: softprops/action-gh-release@v2
        with:
          repository: knotpad/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.client_payload.ref || inputs.tag }}
          files: updater.json
